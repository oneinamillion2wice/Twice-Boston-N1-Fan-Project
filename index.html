<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadium View Sweetie</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF5F2;
            --container-bg: #FFFFFF;
            --accent-pink: #FFB3C6;
            --accent-peach: #FFD2B8;
            --button-text: #603F3F;
            --text-main: #6B4E4E;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { 
            background: var(--container-bg); 
            padding: 40px 30px; 
            border-radius: 25px; 
            display: inline-block; 
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 30px rgba(255, 179, 198, 0.15);
            border: 2px solid #FFEBE5;
        }

        h1 {
            color: #FF8BA7;
            font-weight: 700;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        input { 
            padding: 15px; 
            width: 80px; 
            border: 2px solid #FFE0D9; 
            border-radius: 12px; 
            background: #FFFAF8; 
            color: var(--text-main); 
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1em;
            transition: 0.3s;
            /* Removes the tiny arrows on number inputs */
            -moz-appearance: textfield;
        }

        /* Removes arrows for Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 5px rgba(255, 179, 198, 0.5);
        }

        button { 
            padding: 15px 35px; 
            background: var(--accent-pink); 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            border-radius: 50px; 
            color: var(--button-text); 
            transition: all 0.3s ease; 
            font-size: 1.2em;
            box-shadow: 0 4px 10px rgba(255, 179, 198, 0.3);
        }

        button:hover { 
            background: var(--accent-peach); 
            transform: translateY(-3px);
        }

        #viewImage { 
            width: 100%; 
            margin-top: 30px;
            border-radius: 20px; 
            display: none; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            border: 5px solid white; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Twice Boston N1 Fan Project</h1>
    
    <div class="input-group">
        <input type="number" id="sec" placeholder="Sec" min="1">
        <input type="number" id="row" placeholder="Row" min="1">
        <input type="number" id="seat" placeholder="Seat" min="1">
    </div>

    <button onclick="findSeat()">Find Color!</button>

    <div id="resultArea">
        <img id="viewImage" src="" alt="Seat View">
    </div>
</div>

<script>
    async function findSeat() {
        const scriptUrl = "https://script.google.com/macros/s/AKfycbyWmc9rdiYP-u2TL7n9SUnKjOujwE3lgWv02Ahdw9kreB11vistpgNS_pCsgPOWrNWaVg/exec";
        
        const sec = document.getElementById('sec').value;
        const row = document.getElementById('row').value;
        const seat = document.getElementById('seat').value;
        const imgElement = document.getElementById('viewImage');

        if (!sec || !row || !seat) {
            alert("Enter your section row and seat number!");
            return;
        }

        try {
            const response = await fetch(`${scriptUrl}?section=${sec}&row=${row}&seat=${seat}`);
            const data = await response.json();

            imgElement.src = data.url;
            imgElement.style.display = "block";
            
            // Smoothly scroll down to the image once it appears
            imgElement.scrollIntoView({ behavior: 'smooth' });
            
        } catch (error) {
            console.error("Connection error:", error);
        }
    }
</script>

</body>
</html>
